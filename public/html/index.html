<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magwalk</title>
    <meta name="application-name" content="Magwalk" />
    <meta name="theme-color" content="#05070b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Magwalk" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/landing.css" />
  </head>
  <body class="preview-page">
    <div class="app-preview" aria-hidden="true">
      <div class="preview-top">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="preview-actions">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="preview-dashboard"></div>
      <div class="preview-map">
        <span></span>
      </div>
    </div>
    <main class="landing-shell">
      <section class="container">
        <div class="row align-items-center g-4">
          <div class="col-lg-7">
            <p class="eyebrow">Magwalk</p>
            <h1 class="display-5 fw-bold">Location logging after sign-in</h1>
            <p class="lead text-secondary">
              Sign in, allow browser location permission, and commit one location log to PostgreSQL
              every 3 seconds.
            </p>
            <div class="d-flex flex-wrap gap-2">
              <a class="btn btn-primary btn-lg" href="/signin">Sign In</a>
              <a class="btn btn-outline-secondary btn-lg" href="/signup">Sign Up</a>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="landing-card shadow-sm">
              <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                  <span class="badge rounded-pill text-bg-light mb-2">Live</span>
                  <h2 class="h4 mb-0">3-second commit flow</h2>
                </div>
                <span class="status-dot"></span>
              </div>
              <div class="route-preview">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <dl class="row mb-0 small text-secondary">
                <dt class="col-5">Storage</dt>
                <dd class="col-7">PostgreSQL</dd>
                <dt class="col-5">Map</dt>
                <dd class="col-7">MapLibre GL</dd>
                <dt class="col-5">Session</dt>
                <dd class="col-7">Signed-in user</dd>
              </dl>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="/js/pwa.js"></script>
  </body>
</html>
