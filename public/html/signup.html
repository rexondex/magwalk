<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Magwalk</title>
    <meta name="application-name" content="Magwalk" />
    <meta name="theme-color" content="#05070b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Magwalk" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body class="preview-page">
    <div class="app-preview" aria-hidden="true">
      <div class="preview-top">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="preview-actions">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="preview-dashboard"></div>
      <div class="preview-map">
        <span></span>
      </div>
    </div>
    <main class="auth-shell">
      <section class="container">
        <div class="auth-panel card shadow-sm">
          <div class="card-body p-4 p-md-5">
            <p class="eyebrow">Magwalk</p>
            <h1 class="h2 fw-bold mb-4">Sign Up</h1>
            <form id="signupForm" class="auth-form">
              <div>
                <label class="form-label" for="username">ID</label>
                <input id="username" class="form-control form-control-lg" name="username" type="text" autocomplete="username" required />
              </div>
              <div>
                <label class="form-label" for="password">Password</label>
                <input id="password" class="form-control form-control-lg" name="password" type="password" autocomplete="new-password" required />
              </div>
              <p id="authStatus" class="status-text mb-0"></p>
              <div class="d-grid gap-2">
                <button id="signupButton" class="btn btn-primary btn-lg auth-submit-button" type="submit">
                  <span class="auth-button-label">Create Account</span>
                  <span class="auth-button-spinner" aria-hidden="true"></span>
                </button>
                <a class="btn btn-outline-secondary btn-lg" href="/signin">Sign In</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script src="/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/js/pwa.js"></script>
    <script src="/js/signup.js"></script>
  </body>
</html>
