<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magwalk Leaflet View</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQF6x2lMlfWPn5G7ZfYI4/xyGf9p0NY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./css/leaflet-location.css" />
  </head>
  <body>
    <main class="leaflet-view">
      <section class="toolbar" aria-label="Location controls">
        <div>
          <p class="eyebrow">Magwalk View</p>
          <h1>Leaflet Location Path</h1>
        </div>

        <div class="actions">
          <button id="btn-permission" type="button">Permission</button>
          <button id="btn-on" type="button" disabled>Collect ON</button>
          <button id="btn-off" type="button" disabled>Collect OFF</button>
        </div>
      </section>

      <section class="map-layout">
        <div id="map" class="map" aria-label="Live location map"></div>

        <aside class="side-panel">
          <div class="metric-grid" aria-live="polite">
            <div class="metric">
              <span>Latitude</span>
              <strong id="latitude">-</strong>
            </div>
            <div class="metric">
              <span>Longitude</span>
              <strong id="longitude">-</strong>
            </div>
            <div class="metric">
              <span>Accuracy</span>
              <strong id="accuracy">-</strong>
            </div>
            <div class="metric">
              <span>Count</span>
              <strong id="location-count">0</strong>
            </div>
          </div>

          <div class="log-panel">
            <h2>Location Log</h2>
            <div id="log-board" class="log-board" aria-live="polite"></div>
          </div>
        </aside>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./js/leaflet-location.js"></script>
  </body>
</html>
